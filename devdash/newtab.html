<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevDash</title>
  <!-- Shared UI System -->
  <link rel="stylesheet" href="shared/ui-components.css">
  <link rel="stylesheet" href="css/newtab.css">
</head>
<body class="theme-dark">
  <div class="dashboard-container">
    
    <!-- Quote Widget (Now part of the grid or at least draggable) -->
    <div class="widget glass-card quote-container fade-in" data-widget-id="quote">
      <h2>✨ Daily Inspiration</h2>
      <p id="quote-text" class="quote-text">"It works on my machine."</p>
      <span id="quote-author" class="quote-author">- Developer</span>
      <button id="refresh-quote-btn" class="glass-btn" style="position:absolute; bottom:1rem; right:1rem; padding:0.2rem 0.5rem;" title="Get new quote">↻</button>
    </div>

    <!-- Center: Clock & Date -->
    <main class="time-container fade-in">
      <h1 id="clock" class="clock-display">00:00</h1>
      <p id="date" class="date-display">Monday, January 1</p>
    </main>

    <!-- Search Bar -->
    <div class="search-container fade-in">
      <form id="search-form" class="search-form">
        <input type="text" id="search-input" placeholder="Search Google or type a URL..." class="search-input" autofocus>
      </form>
    </div>

    <!-- Widgets Grid -->
    <section class="widgets-grid">
      
      <!-- Goals Widget -->
      <div class="widget glass-card goals-widget slide-up" data-widget-id="goals" style="animation-delay: 0.1s;">
        <h2>🎯 Active Goals</h2>
        <div class="input-group">
          <input type="text" id="goal-input" placeholder="Add a new goal..." class="glass-input">
          <button id="add-goal-btn" class="glass-btn btn-primary">+</button>
        </div>
        <ul id="goals-list" class="item-list"></ul>
      </div>

      <!-- Timer Widget -->
      <div class="widget glass-card timer-widget slide-up" data-widget-id="timer" style="animation-delay: 0.2s;">
        <h2>🍅 Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="start-timer-btn" class="glass-btn btn-primary">Start</button>
          <button id="pause-timer-btn" class="glass-btn btn-warning" style="display: none;">Pause</button>
          <button id="reset-timer-btn" class="glass-btn btn-danger">Reset</button>
        </div>
        <div class="timer-settings">
          <label><input type="radio" name="timer-mode" value="work" checked> Work (25m)</label>
          <label><input type="radio" name="timer-mode" value="shortBreak"> Break (5m)</label>
        </div>
      </div>

      <!-- ToDo Widget -->
      <div class="widget glass-card todo-widget slide-up" data-widget-id="todo" style="animation-delay: 0.3s;">
        <h2>📝 Today's Tasks</h2>
        <div class="input-group">
          <input type="text" id="todo-input" placeholder="What needs to be done?" class="glass-input">
          <button id="add-todo-btn" class="glass-btn btn-primary">+</button>
        </div>
        <ul id="todo-list" class="item-list"></ul>
      </div>

      <!-- Quick Links Widget -->
      <div class="widget glass-card links-widget slide-up" data-widget-id="links" style="animation-delay: 0.4s;">
        <h2>🔗 Quick Links</h2>
        <div class="input-group">
          <input type="text" id="link-name-input" placeholder="Name" class="glass-input" style="width: 40%">
          <input type="text" id="link-url-input" placeholder="URL" class="glass-input" style="width: 60%">
          <button id="add-link-btn" class="glass-btn btn-primary">+</button>
        </div>
        <ul id="links-list" class="item-list links-list"></ul>
      </div>

    </section>

    <!-- GitHub Contribution Graph -->
    <section class="github-container fade-in widget glass-card" data-widget-id="github" style="animation-delay: 0.5s;">
      <div class="github-header">
        <h2>🐙 GitHub Contributions</h2>
        <div class="input-group github-input-group">
          <input type="text" id="github-username-input" placeholder="Enter GitHub Username" class="glass-input">
          <button id="save-github-btn" class="glass-btn btn-primary">Save</button>
        </div>
      </div>
      <div id="github-graph-container" class="github-graph-container">
        <p class="placeholder-text">Enter your GitHub username to see your contribution graph.</p>
      </div>
    </section>

  </div>

  <!-- Wallpaper Settings -->
  <button id="wallpaper-toggle-btn" class="wallpaper-btn">🖼️</button>
  <div id="wallpaper-modal" class="wallpaper-modal">
    <h3>Set Wallpaper</h3>
    <div class="input-group">
      <input type="text" id="wallpaper-url-input" placeholder="Image URL (e.g. Unsplash)" class="glass-input">
      <button id="set-url-btn" class="glass-btn btn-primary">Set</button>
    </div>
    <div>
      <label style="font-size: 0.9rem; color: #ccc;">Or Upload Image:</label>
      <input type="file" id="wallpaper-upload" accept="image/*" style="margin-top: 0.5rem; width: 100%;">
    </div>
    <button id="reset-wallpaper-btn" class="glass-btn btn-danger" style="margin-top: 0.5rem; width: 100%;">Reset Default</button>
  </div>

  <script src="shared/storage-utils.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/search.js"></script>
  <script src="js/links.js"></script>
  <script src="js/github.js"></script>
  <script src="js/wallpaper.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/resize.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/visibility.js"></script>
</body>
</html>
