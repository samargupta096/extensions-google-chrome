<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevDash</title>
  <!-- Shared UI System -->
  <link rel="stylesheet" href="shared/ui-components.css">
  <link rel="stylesheet" href="css/newtab.css">
</head>
<body class="theme-dark">
  <div class="dashboard-container">
    
    <!-- Top Bar: Quote -->
    <header class="quote-container glass-card fade-in">
      <p id="quote-text" class="quote-text">"It works on my machine."</p>
      <span id="quote-author" class="quote-author">- Developer</span>
    </header>

    <!-- Center: Clock & Date -->
    <main class="time-container fade-in">
      <h1 id="clock" class="clock-display">00:00</h1>
      <p id="date" class="date-display">Monday, January 1</p>
    </main>

    <!-- Widgets Grid -->
    <section class="widgets-grid">
      
      <!-- Goals Widget -->
      <div class="widget glass-card goals-widget slide-up" style="animation-delay: 0.1s;">
        <h2>🎯 Active Goals</h2>
        <div class="input-group">
          <input type="text" id="goal-input" placeholder="Add a new goal..." class="glass-input">
          <button id="add-goal-btn" class="glass-btn btn-primary">+</button>
        </div>
        <ul id="goals-list" class="item-list"></ul>
      </div>

      <!-- Timer Widget -->
      <div class="widget glass-card timer-widget slide-up" style="animation-delay: 0.2s;">
        <h2>🍅 Focus Timer</h2>
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="start-timer-btn" class="glass-btn btn-primary">Start</button>
          <button id="pause-timer-btn" class="glass-btn btn-warning" style="display: none;">Pause</button>
          <button id="reset-timer-btn" class="glass-btn btn-danger">Reset</button>
        </div>
        <div class="timer-settings">
          <label><input type="radio" name="timer-mode" value="work" checked> Work (25m)</label>
          <label><input type="radio" name="timer-mode" value="shortBreak"> Break (5m)</label>
        </div>
      </div>

      <!-- ToDo Widget -->
      <div class="widget glass-card todo-widget slide-up" style="animation-delay: 0.3s;">
        <h2>📝 Today's Tasks</h2>
        <div class="input-group">
          <input type="text" id="todo-input" placeholder="What needs to be done?" class="glass-input">
          <button id="add-todo-btn" class="glass-btn btn-primary">+</button>
        </div>
        <ul id="todo-list" class="item-list"></ul>
      </div>

    </section>
  </div>

  <script src="shared/storage-utils.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/quotes.js"></script>
  <script src="js/todo.js"></script>
  <script src="js/goals.js"></script>
  <script src="js/timer.js"></script>
</body>
</html>
