<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PagePilot</title>
  <link rel="stylesheet" href="../shared/ui-components.css">
  <link rel="stylesheet" href="pagepilot.css">
</head>
<body>
  <div class="popup-container" style="min-height:520px;">
    <div class="header">
      <div class="header-title"><span style="font-size:22px;">🔍</span><h1>PagePilot</h1></div>
      <div class="header-actions">
        <div class="model-selector-wrapper">
          <select class="model-select loading" id="model-select" title="Select AI Model">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="ollama-status disconnected" id="ollama-status"><span class="status-dot offline"></span><span>AI</span></div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="chat">💬 Chat</button>
      <button class="tab" data-tab="tools">🛠️ Tools</button>
    </div>
    <div class="tab-content active" id="tab-chat">
      <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome">
            <span style="font-size:32px;">🔍</span>
            <h3>Chat with this Page</h3>
            <p>Ask anything about the current page content</p>
          </div>
        </div>
        <div class="input-group" style="margin-top:8px;">
          <input type="text" class="input" id="chat-input" placeholder="Ask about this page...">
          <button class="btn btn-primary btn-sm" id="btn-send">Send</button>
        </div>
      </div>
    </div>
    <div class="tab-content" id="tab-tools" style="display:none;">
      <div class="tool-grid" id="tool-grid">
        <div class="tool-quick" data-tool="json"><div class="tq-icon">📋</div><div class="tq-label">JSON Format</div></div>
        <div class="tool-quick" data-tool="base64"><div class="tq-icon">🔐</div><div class="tq-label">Base64</div></div>
        <div class="tool-quick" data-tool="url"><div class="tq-icon">🔗</div><div class="tq-label">URL Encode</div></div>
        <div class="tool-quick" data-tool="timestamp"><div class="tq-icon">⏰</div><div class="tq-label">Timestamp</div></div>
        <div class="tool-quick" data-tool="lorem"><div class="tq-icon">📝</div><div class="tq-label">Lorem Ipsum</div></div>
        <div class="tool-quick" data-tool="counter"><div class="tq-icon">🔢</div><div class="tq-label">Word Count</div></div>
        <div class="tool-quick" data-tool="color"><div class="tq-icon">🎨</div><div class="tq-label">Color Convert</div></div>
        <div class="tool-quick" data-tool="regex"><div class="tq-icon">🔎</div><div class="tq-label">Regex Test</div></div>
      </div>
      <div id="tool-area" style="margin-top:12px;"></div>
    </div>
  </div>
  <script src="../shared/ollama-client.js"></script>
  <script src="pagepilot.js"></script>
</body>
</html>
