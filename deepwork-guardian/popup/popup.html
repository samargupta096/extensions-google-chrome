<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepWork Guardian</title>
  <link rel="stylesheet" href="../shared/ui-components.css">
  <style>
    /* Focus Timer */
    .focus-card { text-align: center; padding: 24px 16px; background: linear-gradient(135deg, rgba(108, 92, 231, 0.06), rgba(0, 206, 201, 0.03)); }
    .timer-display { display: flex; justify-content: center; margin-bottom: 18px; }
    .timer-ring { position: relative; width: 170px; height: 170px; }
    .timer-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .timer-bg { fill: none; stroke: rgba(255, 255, 255, 0.06); stroke-width: 8; }
    .timer-progress { fill: none; stroke: #6C5CE7; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 553; stroke-dashoffset: 553; transition: stroke-dashoffset 1s linear; }
    .timer-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .timer-time { font-size: 36px; font-weight: 800; letter-spacing: 1px; font-variant-numeric: tabular-nums; }
    .timer-label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 4px; font-weight: 600; }
    .timer-controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 14px; }
    .session-dots { display: flex; gap: 6px; justify-content: center; }
    .session-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
    .session-dot.completed { background: var(--accent-green); box-shadow: 0 0 8px rgba(0, 184, 148, 0.4); }
    .session-dot.active { background: var(--accent-purple); box-shadow: 0 0 8px rgba(108, 92, 231, 0.4); animation: pulse 2s infinite; }

    /* Section */
    .section-title { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 10px; }

    /* Top Sites */
    .site-row { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-radius: 6px; }
    .site-icon { width: 24px; height: 24px; border-radius: 6px; background: rgba(255,255,255,0.04); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .site-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .site-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
    .site-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .site-time { font-size: 11px; font-weight: 700; color: var(--text-secondary); flex-shrink: 0; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

    /* Setting Row */
    .setting-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .blocking-status { margin-top: 8px; }

    /* Break state */
    .focus-card.break-state { background: linear-gradient(135deg, rgba(0, 206, 201, 0.06), rgba(0, 184, 148, 0.03)); }
    .focus-card.break-state .timer-time { color: var(--accent-cyan); }
    .focus-card.break-state .timer-progress { stroke: #00CEC9; }
  </style>
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="header-title">
        <span style="font-size: 22px;">⏱️</span>
        <h1>DeepWork</h1>
      </div>
      <div class="header-actions">
        <div class="model-selector-wrapper">
          <select class="model-select loading" id="model-select" title="Select AI Model">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="ollama-status disconnected" id="ollama-status">
          <span class="status-dot offline"></span>
          <span>Ollama</span>
        </div>
        <button class="btn btn-ghost btn-icon" id="open-dashboard" title="Open Dashboard">📊</button>
      </div>
    </div>

    <!-- Focus Timer -->
    <div class="card focus-card" id="focus-card">
      <div class="timer-display">
        <div class="timer-ring">
          <svg viewBox="0 0 200 200">
            <circle class="timer-bg" cx="100" cy="100" r="88"/>
            <circle class="timer-progress" cx="100" cy="100" r="88" id="timer-circle"/>
          </svg>
          <div class="timer-inner">
            <div class="timer-time" id="timer-time">25:00</div>
            <div class="timer-label" id="timer-label">Ready to focus</div>
          </div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="btn btn-secondary btn-sm" id="btn-decrease">−5m</button>
        <button class="btn btn-primary btn-lg" id="btn-start">▶ Start Focus</button>
        <button class="btn btn-secondary btn-sm" id="btn-increase">+5m</button>
      </div>
      <div class="session-dots" id="session-dots"></div>
    </div>

    <!-- Today's Stats -->
    <div class="section-title">Today's Overview</div>
    <div class="grid grid-3 stagger">
      <div class="card stat-card slide-up">
        <div class="stat-icon" style="background: rgba(108, 92, 231, 0.12);">🕐</div>
        <div class="stat-value" id="total-time">0m</div>
        <div class="stat-label">Time</div>
      </div>
      <div class="card stat-card slide-up">
        <div class="stat-icon" style="background: rgba(0, 184, 148, 0.12);">🎯</div>
        <div class="stat-value" id="focus-score">0%</div>
        <div class="stat-label">Focus</div>
      </div>
      <div class="card stat-card slide-up">
        <div class="stat-icon" style="background: rgba(253, 121, 168, 0.12);">🔥</div>
        <div class="stat-value" id="sessions-count">0</div>
        <div class="stat-label">Sessions</div>
      </div>
    </div>

    <!-- Top Sites -->
    <div class="section-title">Top Sites Today</div>
    <div class="card" id="top-sites-card">
      <div id="top-sites-list"></div>
    </div>

    <!-- Category Chart -->
    <div class="section-title">Categories</div>
    <div class="card">
      <div class="chart-container" style="height: 170px;">
        <canvas id="category-chart"></canvas>
      </div>
    </div>

    <!-- Blocking Toggle -->
    <div class="section-title">Blocking</div>
    <div class="card">
      <div class="setting-row">
        <span>Block distracting sites</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-blocking">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="blocking-status" id="blocking-status">
        <span class="badge badge-green">Active during focus sessions</span>
      </div>
    </div>

    <button class="btn btn-secondary" id="btn-open-dashboard" style="width:100%;margin-top:14px;">
      📊 Open Full Dashboard
    </button>
  </div>

  <script src="../shared/chart-utils.js"></script>
  <script src="../shared/ollama-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
