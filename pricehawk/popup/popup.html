<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PriceHawk</title>
  <link rel="stylesheet" href="../shared/ui-components.css">
  <style>
    .product-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .form-row { display: flex; gap: 8px; }
    .product-list { max-height: 380px; overflow-y: auto; }
    .product-item { padding: 14px; border: 1px solid var(--border-color); border-radius: var(--radius-md); margin-bottom: 10px; transition: all 0.2s; }
    .product-item:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }
    .product-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-domain { font-size: 11px; color: var(--accent-cyan); margin-bottom: 10px; font-weight: 500; }
    .price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .price-current { font-size: 22px; font-weight: 800; color: var(--accent-green); letter-spacing: -0.5px; }
    .price-stats { display: flex; gap: 14px; font-size: 11px; color: var(--text-tertiary); margin-bottom: 10px; }
    .price-stat span { font-weight: 700; color: var(--text-secondary); }
    .chart-mini { height: 80px; margin-bottom: 10px; border-radius: 6px; overflow: hidden; }
    .fake-sale-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; background: rgba(255,107,107,0.15); color: var(--accent-red); margin-left: 8px; }
    .good-deal-badge { background: rgba(0,184,148,0.15); color: var(--accent-green); }
    .ai-analysis { margin-top: 10px; padding: 12px; background: rgba(108,92,231,0.06); border: 1px solid rgba(108,92,231,0.1); border-radius: var(--radius-sm); font-size: 12px; color: var(--text-secondary); line-height: 1.6; animation: fadeIn 0.3s ease; }
    .section-title { font-size: 11px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin: 18px 0 10px; }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="header-title"><span style="font-size: 22px;">🦅</span><h1>PriceHawk</h1></div>
      <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
        <div class="model-selector-wrapper">
          <select class="model-select loading" id="model-select" title="Select AI Model">
            <option value="">Loading...</option>
          </select>
        </div>
        <div class="ollama-status disconnected" id="ollama-status">
          <span class="status-dot offline"></span>
          <span>Ollama</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="track">🏷️ Track</button>
      <button class="tab" data-tab="products">📦 Products</button>
      <button class="tab" data-tab="stats">📊 Stats</button>
    </div>

    <div class="tab-content active" id="tab-track">
      <div class="product-form">
        <input type="text" class="input" id="input-name" placeholder="Product name">
        <input type="text" class="input" id="input-url" placeholder="Product URL">
        <div class="form-row">
          <input type="number" class="input" id="input-price" placeholder="Current price" step="0.01">
          <input type="number" class="input" id="input-target" placeholder="Target price" step="0.01">
        </div>
        <button class="btn btn-primary" id="btn-add" style="width:100%;">🎯 Start Tracking</button>
      </div>
      <button class="btn btn-secondary" id="btn-autofill" style="width:100%;">📎 Auto-fill from Current Tab</button>
    </div>

    <div class="tab-content" id="tab-products" style="display:none;">
      <div id="product-list" class="product-list"></div>
    </div>

    <div class="tab-content" id="tab-stats" style="display:none;">
      <div class="grid grid-2 stagger" style="margin-bottom:12px;">
        <div class="card stat-card slide-up">
          <div class="stat-icon" style="background:rgba(108,92,231,0.12);">📦</div>
          <div class="stat-value" id="stat-products">0</div>
          <div class="stat-label">Tracked</div>
        </div>
        <div class="card stat-card slide-up">
          <div class="stat-icon" style="background:rgba(0,184,148,0.12);">💰</div>
          <div class="stat-value" id="stat-savings">₹0</div>
          <div class="stat-label">Savings</div>
        </div>
      </div>
      <div class="card slide-up">
        <div class="card-header"><div class="card-title">Stores Tracked</div></div>
        <div class="chart-container" style="height:160px;"><canvas id="chart-stores"></canvas></div>
      </div>
    </div>
  </div>

  <script src="../shared/chart-utils.js"></script>
  <script src="../shared/ollama-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
